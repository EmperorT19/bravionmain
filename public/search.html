<!DOCTYPE html>
<html>
<head>
  <title>JS Searcher</title>
</head>
<body>
  <h1>Search Results</h1>
  <div id="results">Searching...</div>

  <script>
    async function searchInFile(url, query, name) {
      try {
        const response = await fetch(url);
        const text = await response.text();
        const resultsDiv = document.getElementById('results');
        
        let index = 0;
        let matchCount = 0;
        let output = `<h3>Results for ${name} (${url}) searching for "${query}":</h3>`;
        
        while ((index = text.toLowerCase().indexOf(query.toLowerCase(), index)) !== -1) {
          matchCount++;
          const start = Math.max(0, index - 200);
          const end = Math.min(text.length, index + query.length + 200);
          const context = text.substring(start, end);
          output += `<p>Match ${matchCount} at index ${index}:</p>`;
          output += `<pre style="background: #f4f4f4; padding: 10px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word;">...${escapeHtml(context)}...</pre>`;
          index += query.length;
          if (matchCount >= 5) break; // Limit to 5 matches
        }
        
        if (matchCount === 0) {
          output += `<p>No matches found.</p>`;
        }
        
        const div = document.createElement('div');
        div.innerHTML = output;
        resultsDiv.appendChild(div);
      } catch (err) {
        console.error(err);
        document.getElementById('results').innerHTML += `<p style="color:red">Error fetching ${url}: ${err.message}</p>`;
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    async function run() {
      document.getElementById('results').innerHTML = '';
      
      // Motors
      await searchInFile('/bravionmotors/main-TSAIV3JM.js', '2018', 'Motors (2018)');
      await searchInFile('/bravionmotors/main-TSAIV3JM.js', 'ESTABLISHED', 'Motors (ESTABLISHED)');
      await searchInFile('/bravionmotors/main-TSAIV3JM.js', 'BRAVION MOTORS', 'Motors (BRAVION MOTORS)');
      
      // Printers
      await searchInFile('/bravionprinters/main-OXDITW4G.js', 'Printers Ltd', 'Printers (Printers Ltd)');
      await searchInFile('/bravionprinters/main-OXDITW4G.js', 'Rights Reserved', 'Printers (Rights Reserved)');
      
      // Technologies
      await searchInFile('/braviontechnologies/main-FDKWA66A.js', 'Technologies', 'Technologies (Technologies)');
      await searchInFile('/braviontechnologies/main-FDKWA66A.js', 'All rights reserved', 'Technologies (All rights reserved)');
    }

    run();
  </script>
</body>
</html>
