<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #333;
      color: #fff;
      font-family: sans-serif;
      padding: 20px;
    }
    .logo-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
      align-items: stretch;
    }
    .logo-card {
      border: 1px solid #666;
      padding: 10px;
      background-color: #222;
      text-align: center;
      flex: 1;
      min-width: 300px;
    }
    .bg-white {
      background-color: #fff;
      color: #000;
      padding: 10px;
      margin-top: 10px;
    }
    .bg-black {
      background-color: #000;
      color: #fff;
      padding: 10px;
      margin-top: 10px;
    }
    img {
      max-width: 100%;
      height: auto;
      border: 1px dashed #888;
    }
  </style>
</head>
<body>
  <h1>Logo Comparison and Transparency Test</h1>
  <div class="logo-container">
    <div class="logo-card">
      <h3>bravion group white.jpeg (Original)</h3>
      <div class="bg-white">
        <img src="bravion group white.jpeg" alt="White Original on White">
      </div>
      <div class="bg-black">
        <img src="bravion group white.jpeg" alt="White Original on Black">
      </div>
    </div>
    
    <div class="logo-card">
      <h3>bravion_group_white_transparent.png (Processed)</h3>
      <div class="bg-white">
        <img src="bravion_group_white_transparent.png" alt="White Processed on White">
      </div>
      <div class="bg-black">
        <img src="bravion_group_white_transparent.png" alt="White Processed on Black">
      </div>
    </div>
  </div>

  <div class="logo-container">
    <div class="logo-card">
      <h3>bravion group black.jpeg (Original)</h3>
      <div class="bg-white">
        <img src="bravion group black.jpeg" alt="Black Original on White">
      </div>
      <div class="bg-black">
        <img src="bravion group black.jpeg" alt="Black Original on Black">
      </div>
    </div>
    
    <div class="logo-card">
      <h3>bravion_group_black_transparent.png (Processed)</h3>
      <div class="bg-white">
        <img src="bravion_group_black_transparent.png" alt="Black Processed on White">
      </div>
      <div class="bg-black">
        <img src="bravion_group_black_transparent.png" alt="Black Processed on Black">
      </div>
    </div>
  </div>
</body>
</html>
